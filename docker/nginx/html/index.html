<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>slurmtack dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace; background: #f5f5f5; color: #1a1a1a; }
    header { background: #1a1a2e; color: #fff; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 1rem; font-weight: 600; }
    #health-badge { font-size: 0.8rem; padding: 4px 10px; border-radius: 12px; }
    .healthy { background: #2ecc71; color: #fff; }
    .unhealthy { background: #e74c3c; color: #fff; }
    .checking { background: #95a5a6; color: #fff; }

    .layout { display: grid; grid-template-columns: 200px 1fr 320px; gap: 0; min-height: calc(100vh - 48px); }
    @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }

    .panel { padding: 16px; border-right: 1px solid #ddd; }
    .panel:last-child { border-right: none; }
    .panel h2 { font-size: 0.85rem; text-transform: uppercase; color: #666; margin-bottom: 12px; letter-spacing: 0.5px; }

    /* Partition nav */
    #partition-list { list-style: none; }
    #partition-list li { padding: 8px 12px; cursor: pointer; border-radius: 4px; font-size: 0.9rem; margin-bottom: 2px; }
    #partition-list li:hover { background: #e8e8e8; }
    #partition-list li.active { background: #1a1a2e; color: #fff; }

    /* Node grid */
    #node-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
    .node-card { background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 14px; }
    .node-card h3 { font-size: 0.9rem; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
    .node-card .owner-badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; font-weight: 600; text-transform: uppercase; }
    .owner-slurm { background: #d4edda; color: #155724; }
    .owner-openstack { background: #cce5ff; color: #004085; }
    .owner-switching { background: #fff3cd; color: #856404; }
    .owner-conflict { background: #f8d7da; color: #721c24; }
    .owner-unknown { background: #e2e3e5; color: #383d41; }
    .node-card .meta { font-size: 0.8rem; color: #555; margin-bottom: 8px; }
    .node-card .actions { display: flex; gap: 6px; }
    .node-card .actions button { font-size: 0.75rem; padding: 4px 10px; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; background: #fff; }
    .node-card .actions button:hover { background: #f0f0f0; }
    .node-card .actions button.danger { border-color: #e74c3c; color: #e74c3c; }
    .node-card .actions button.danger:hover { background: #fdf0ef; }

    /* Partition action bar */
    #partition-action-bar { margin-bottom: 12px; padding: 10px 14px; background: #fff; border: 1px solid #ddd; border-radius: 6px; display: none; align-items: center; gap: 10px; }
    #partition-action-bar .partition-label { font-size: 0.8rem; color: #555; }
    #partition-action-bar button { font-size: 0.8rem; padding: 6px 12px; border: 1px solid #1a1a2e; border-radius: 4px; cursor: pointer; background: #1a1a2e; color: #fff; }
    #partition-action-bar button:hover { background: #2a2a4e; }

    /* History panel */
    #history-list { list-style: none; max-height: calc(100vh - 140px); overflow-y: auto; }
    #history-list li { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 0.8rem; }
    #history-list li:hover { background: #f8f8f8; }
    .history-status { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    .history-status.succeeded { background: #2ecc71; }
    .history-status.failed { background: #e74c3c; }
    .history-status.active { background: #f39c12; }

    /* History filters */
    .history-filters { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
    .history-filters select, .history-filters input { font-size: 0.75rem; padding: 4px 6px; border: 1px solid #ccc; border-radius: 4px; }

    /* Detail drawer */
    #detail-drawer { display: none; position: fixed; top: 0; right: 0; width: 420px; height: 100vh; background: #fff; box-shadow: -2px 0 8px rgba(0,0,0,0.1); z-index: 100; overflow-y: auto; padding: 20px; }
    #detail-drawer.open { display: block; }
    #detail-drawer h2 { font-size: 1rem; margin-bottom: 12px; }
    #detail-drawer .close-btn { position: absolute; top: 12px; right: 16px; cursor: pointer; font-size: 1.2rem; background: none; border: none; }
    .step-timeline { list-style: none; }
    .step-timeline li { padding: 8px 0; border-bottom: 1px solid #eee; font-size: 0.8rem; }
    .step-timeline .step-status { font-weight: 600; }
    .step-timeline .step-status.succeeded { color: #2ecc71; }
    .step-timeline .step-status.failed { color: #e74c3c; }
    .step-timeline .step-status.running { color: #f39c12; }

    #loading-overlay { position: fixed; top: 48px; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.8); display: flex; align-items: center; justify-content: center; z-index: 50; }
    #loading-overlay.hidden { display: none; }
    .error-banner { background: #f8d7da; color: #721c24; padding: 10px 16px; font-size: 0.85rem; text-align: center; }
  </style>
</head>
<body>
  <header>
    <h1>slurmtack dashboard</h1>
    <span id="health-badge" class="checking">checking...</span>
  </header>

  <div id="error-banner" class="error-banner" style="display:none"></div>

  <div class="layout">
    <div class="panel" id="partition-panel">
      <h2>Partitions</h2>
      <ul id="partition-list"></ul>
    </div>

    <div class="panel" id="node-panel">
      <h2>Nodes</h2>
      <div id="partition-action-bar"></div>
      <div id="node-grid"></div>
    </div>

    <div class="panel" id="history-panel">
      <h2>History</h2>
      <div class="history-filters">
        <select id="history-node-filter"><option value="">All nodes</option></select>
        <select id="history-status-filter">
          <option value="">All statuses</option>
          <option value="active">Active</option>
          <option value="succeeded">Succeeded</option>
          <option value="failed">Failed</option>
        </select>
      </div>
      <ul id="history-list"></ul>
      <button id="history-load-more" style="display:none; width:100%; margin-top:8px; padding:6px; font-size:0.8rem; cursor:pointer;">Load more</button>
    </div>
  </div>

  <div id="detail-drawer">
    <button class="close-btn" onclick="closeDetail()">&times;</button>
    <h2 id="detail-title"></h2>
    <div id="detail-content"></div>
  </div>

  <div id="loading-overlay"><span>Loading inventory...</span></div>

  <script src="dashboard.js"></script>
</body>
</html>
