server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    location /runtime/ {
        alias /tmp/dashboard-runtime/;
        add_header Cache-Control "no-store";
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location /api/health {
        proxy_pass http://slurmtack:8080/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /v1/ {
        proxy_pass http://slurmtack:8080/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
