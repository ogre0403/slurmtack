set -g default-shell /bin/zsh
set -g default-command "exec /bin/zsh -l"

set-environment -g COLORTERM truecolor

unbind C-b
set -g prefix C-a
bind C-a last-window

set -g mouse on
set -g history-limit 200000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g remain-on-exit off
set -g set-titles on
set -g status-keys vi
setw -g mode-keys vi

set -g status-left-length 40
set -g status-right-length 120
set -g status-interval 60
set -g status-style 'bg=colour235,fg=colour252'
set -g status-left '#[bold fg=colour231 bg=colour31] #S #[fg=colour31 bg=colour235] '
set -g status-right '#[fg=colour231 bg=colour24] #(date -u -d "@$(( $(date -u +%s) + 28800 ))" "+%%Y-%%m-%%d %%H:%%M") '
setw -g window-status-current-format '#[bold fg=colour16 bg=colour81] #I:#W '
setw -g window-status-format '#[fg=colour250 bg=colour238] #I:#W '

bind _ split-window -v
bind | split-window -h
bind r source-file /root/.tmux.conf \; display-message 'tmux config reloaded'
